name: Generate Dev Universe

on:
  # Run every 12 hours
  schedule:
    - cron: '0 */12 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/generate-universe.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Allow committing back to repo
    
    steps:
      - name: 🔍 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 🌌 Generate universe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          MAX_PLANETS: ${{ vars.MAX_PLANETS || 8 }}
          SHOW_MOONS: ${{ vars.SHOW_MOONS || 'true' }}
          SHOW_ASTEROIDS: ${{ vars.SHOW_ASTEROIDS || 'true' }}
          ORBIT_SPEED_MULTIPLIER: ${{ vars.ORBIT_SPEED_MULTIPLIER || '1.0' }}
          BACKGROUND_STARS: ${{ vars.BACKGROUND_STARS || 200 }}
        run: |
          python scripts/generate_universe.py
      
      - name: 📊 Check if universe changed
        id: check_changes
        run: |
          if git diff --quiet output/universe.svg; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected in universe.svg"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✨ Universe has been updated!"
          fi
      
      - name: 💾 Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/universe.svg
          git commit -m "🌌 Update dev universe [skip ci]"
          git push
      
      - name: 🎉 Job summary
        run: |
          echo "## 🌌 Dev Universe Generation Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "✅ Universe updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Username: ${{ github.repository_owner }}" >> $GITHUB_STEP_SUMMARY
          echo "- Max Planets: ${{ vars.MAX_PLANETS || 8 }}" >> $GITHUB_STEP_SUMMARY
          echo "- Show Moons: ${{ vars.SHOW_MOONS || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Show Asteroids: ${{ vars.SHOW_ASTEROIDS || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Background Stars: ${{ vars.BACKGROUND_STARS || 200 }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View your universe at: [output/universe.svg](../blob/main/output/universe.svg)" >> $GITHUB_STEP_SUMMARY
